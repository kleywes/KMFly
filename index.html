<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KMFly | Luxury AI Travel Agent</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Outfit:wght@300;400;600&display=swap');

        :root {
            --bg: #030406;
            --card: #0c0e12;
            --ink: #ffffff;
            --gold: #c6a355;
            --mist: #8a94a8;
            --line: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            font-family: 'Outfit', sans-serif; color: var(--ink);
            height: 100%; width: 100%; overflow-x: hidden;
        }

        /* Background Glow */
        .glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 80% 10%, rgba(198, 163, 85, 0.08), transparent 50%);
            pointer-events: none; z-index: 0;
        }

        /* Nav */
        .nav { 
            position: fixed; top: 0; width: 100%; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 25px; background: rgba(3,4,6,0.9); 
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--line); 
            z-index: 100; 
        }

        .logo { 
            display: flex; align-items: center; gap: 8px; 
            color: var(--ink); font-family: 'Cormorant Garamond', serif; 
            font-size: 22px; font-weight: 600; text-decoration: none;
            letter-spacing: 2px;
        }
        .logo span { color: var(--gold); }

        .lang-picker { display: flex; gap: 5px; }
        .lang-btn { 
            background: none; border: 1px solid var(--line); 
            color: var(--mist); font-size: 10px; padding: 5px 10px; 
            border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Hero Section */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            text-align: center; padding: 20px; z-index: 1; position: relative;
        }
        .hero.hide { display: none; }

        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(38px, 9vw, 80px); line-height: 1.1;
            margin: 20px 0; font-weight: 600;
        }
        h1 em { color: var(--gold); font-style: normal; }

        .sub { 
            color: var(--mist); font-size: clamp(16px, 4vw, 20px); 
            max-width: 600px; margin-bottom: 40px; font-weight: 300; line-height: 1.6;
        }

        .cta { 
            padding: 20px 45px; background: var(--gold); color: #000; 
            border: none; border-radius: 2px; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(198,163,85,0.2);
        }
        .cta:hover { transform: translateY(-3px); background: #fff; }

        /* Chat Area */
        .chat-wrap { 
            display: none; height: 100vh; flex-direction: column; 
            max-width: 900px; margin: 0 auto; padding-top: 70px;
        }
        .chat-wrap.active { display: flex; }

        .msgs { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 100px;
        }

        .bbl { 
            padding: 15px 20px; border-radius: 12px; 
            line-height: 1.6; max-width: 85%; font-size: 15px;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bbl.ai { background: var(--card); border: 1px solid var(--line); align-self: flex-start; border-bottom-left-radius: 2px; color: #e0e6ed; }
        .bbl.user { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 400; }
        .bbl strong { color: var(--gold); display: block; margin-top: 10px; }

        /* Mobile Input Bar */
        .input-bar { 
            position: fixed; bottom: 0; width: 100%; max-width: 900px;
            padding: 15px; background: var(--bg); display: flex; gap: 10px;
            border-top: 1px solid var(--line); align-items: center;
        }
        
        input { 
            flex: 1; background: var(--card); border: 1px solid var(--line); 
            padding: 15px; border-radius: 8px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--gold); }

        .send-btn { 
            background: var(--gold); border: none; width: 50px; height: 50px; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 600px) {
            .nav { padding: 10px 15px; }
            .logo { font-size: 18px; }
            .msgs { padding: 15px; }
            .bbl { max-width: 90%; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div id="root"></div>

    <script type="text/babel">
        const TRANSLATIONS = {
            pt: {
                tag: "Sua próxima aventura,",
                tagItalic: "com curadoria de especialista.",
                sub: "Fuja do comum. Roteiros desenhados por IA com alma de viajante e exclusividade VIP.",
                btn: "Começar Minha Viagem",
                ph: "Para onde vamos hoje?",
                welcome: "Olá! Sou seu especialista KMFly. ✈️ Já estou empolgado! Qual destino você tem em mente ou qual 'vibe' está procurando?"
            },
            en: {
                tag: "Your next adventure,",
                tagItalic: "curated by experts.",
                sub: "Escape the ordinary. AI-powered itineraries with a traveler's soul and VIP exclusivity.",
                btn: "Start My Journey",
                ph: "Where are we heading?",
                welcome: "Hello! I'm your KMFly specialist. ✈️ I'm so excited to help you plan! Where are we heading, or what vibe are you looking for?"
            },
            es: {
                tag: "Tu próxima aventura,",
                tagItalic: "diseñada por expertos.",
                sub: "Escapa de lo comum. Rutas creadas por IA con alma de viajero y exclusividad VIP.",
                btn: "Empezar Mi Viaje",
                ph: "¿A dónde vamos hoy?",
                welcome: "¡Hola! Soy tu especialista de KMFly. ✈️ ¡Qué emoción! ¿A qué destino tienes pensado ir o qué estilo de viaje buscas?"
            }
        };

        function App() {
            const [lang, setLang] = React.useState('pt');
            const [view, setView] = React.useState('hero');
            const [input, setInput] = React.useState('');
            const [messages, setMessages] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const endRef = React.useRef(null);

            const t = TRANSLATIONS[lang];

            React.useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const startChat = () => {
                setView('chat');
                setMessages([{role: 'assistant', content: t.welcome}]);
            };

            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                
                const userMsg = input;
                const updatedMsgs = [...messages, { role: 'user', content: userMsg }];
                setMessages(updatedMsgs);
                setInput('');
                setLoading(true);

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: updatedMsgs })
                    });
                    const data = await res.json();
                    setMessages([...updatedMsgs, { role: 'assistant', content: data.text }]);
                } catch (e) {
                    setMessages([...updatedMsgs, { role: 'assistant', content: "Desculpe, tive um problema na conexão. Pode tentar novamente?" }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="wrap">
                    <nav className="nav">
                        <a href="/" className="logo">KM<span>FLY</span></a>
                        <div className="lang-picker">
                            {['en', 'pt', 'es'].map(l => (
                                <button key={l} 
                                    className={`lang-btn ${lang === l ? 'active' : ''}`}
                                    onClick={() => setLang(l)}>
                                    {l.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <div className={`hero ${view !== 'hero' ? 'hide' : ''}`}>
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#c6a355" strokeWidth="1" style={{marginBottom:'20px'}}>
                            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
                        </svg>
                        <h1>{t.tag}<br/><em>{t.tagItalic}</em></h1>
                        <p className="sub">{t.sub}</p>
                        <button className="cta" onClick={startChat}>{t.btn}</button>
                    </div>

                    <div className={`chat-wrap ${view === 'chat' ? 'active' : ''}`}>
                        <div className="msgs">
                            {messages.map((m, i) => (
                                <div key={i} className={`bbl ${m.role}`}>
                                    {m.content.split('\n').map((line, j) => (
                                        <span key={j}>{line.startsWith('**') ? <strong>{line.replace(/\*\*/g, '')}</strong> : line}<br/></span>
                                    ))}
                                </div>
                            ))}
                            {loading && <div className="bbl ai">...</div>}
                            <div ref={endRef} />
                        </div>

                        <div className="input-bar">
                            <input 
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder={t.ph}
                            />
                            <button className="send-btn" onClick={sendMessage}>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
