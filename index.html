<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMFly - Agente de Viagens VIP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* O CSS Premium que criamos */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Outfit:wght@300;400;600&display=swap');
        :root { --bg: #030406; --card: #0c0e12; --ink: #ffffff; --gold: #c6a355; --mist: #8a94a8; --line: rgba(255,255,255,0.05); }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--ink); margin: 0; overflow-x: hidden; }
        .nav { position: fixed; top: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; background: rgba(3,4,6,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); z-index: 100; box-sizing: border-box; }
        .logo { display: flex; align-items: center; gap: 10px; color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; text-decoration: none; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(40px, 8vw, 72px); margin-bottom: 20px; }
        h1 em { color: var(--gold); font-style: normal; }
        .start-btn { padding: 20px 50px; background: var(--gold); color: #000; border: none; font-weight: 600; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .start-btn:hover { background: #fff; transform: translateY(-2px); }
        .chat-container { max-width: 800px; margin: 100px auto 0; padding: 20px; display: none; }
        .chat-container.active { display: flex; flex-direction: column; }
        .bbl { padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; line-height: 1.6; max-width: 85%; }
        .bbl.ai { background: var(--card); border: 1px solid var(--line); align-self: flex-start; }
        .bbl.user { background: var(--gold); color: #000; align-self: flex-end; }
        .input-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 800px; padding: 20px; background: var(--bg); display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid var(--line); background: var(--card); color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Aqui entra a lógica do React que ajustamos
        function App() {
            const [view, setView] = React.useState('hero');
            const [input, setInput] = React.useState('');
            const [messages, setMessages] = React.useState([]);
            const sendMessage = async () => {
    const userText = input;
    const newMsgs = [...messages, { role: 'user', content: userText }];
    setMessages(newMsgs);
    setInput('');
    
    const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: newMsgs })
    });
    
    const data = await res.json();
    // O Gemini agora retorna direto em data.text
    setMessages([...newMsgs, { role: 'assistant', content: data.text }]);
};


            const startTrip = () => {
                setView('chat');
                setMessages([{role: 'ai', text: "Olá! Sou seu especialista KMFly. ✈️ Já estou empolgado! Para onde vamos viajar?"}]);
            };

            return (
                <div>
                    <nav className="nav">
                        <div className="logo"><span>KM</span>FLY</div>
                    </nav>

                    {view === 'hero' ? (
                        <div className="hero">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#c6a355" strokeWidth="1"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                            <h1>Sua próxima aventura,<br/><em>com curadoria de especialista.</em></h1>
                            <button className="start-btn" onClick={startTrip}>Começar Minha Viagem</button>
                        </div>
                    ) : (
                        <div className="chat-container active">
                            {messages.map((m, i) => (
                                <div key={i} className={`bbl ${m.role}`}>{m.text}</div>
                            ))}
                            <div className="input-area">
                                <input 
                                    value={input} 
                                    onChange={(e) => setInput(e.target.value)} 
                                    placeholder="Digite seu destino..."
                                />
                                <button className="start-btn" style={{padding: '10px 20px'}}>Enviar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
